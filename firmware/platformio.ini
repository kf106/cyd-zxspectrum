; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = cheap-yellow-display

[common]
; Version 6.11.0 of the espressif32 platform was chosen for its stability and compatibility with the current project setup. Pinned on: 2025-07-19.
; Review this version periodically (e.g., every 6 months) to ensure compatibility with newer versions or to address potential issues.
platform = espressif32@6.11.0
framework = arduino
monitor_speed = 115200
build_flags = 
  -std=c++17
  -std=gnu++17
  -O3
  -ffast-math
  -Wl,-Map,output.map
build_unflags =
  -std=gnu++11
  -fno-rtti
lib_deps =
  bblanchon/ArduinoJson@^7.4.1
  SPI
  https://github.com/bitbank2/JPEGDEC#1.7.0
  adafruit/Adafruit seesaw Library
  adafruit/Adafruit BusIO
  Wire
  littlefs
monitor_filters = 
  esp32_exception_decoder        # decode exceptions

[esp32_common]
platform = ${common.platform}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags = ${common.build_flags}
build_unflags = ${common.build_unflags}
lib_deps = ${common.lib_deps}
monitor_filters = ${common.monitor_filters}

[env:cheap-yellow-display]
extends = esp32_common
board = esp-wrover-kit
board_build.filesystem = littlefs
board_build.sdkconfig_defaults = sdkconfig.defaults
build_src_filter =
  +<*>
  -<Input/TouchKeyboardV2.cpp>
  -<Input/TouchKeyboard.cpp>
  +<Input/cyd_touch/>
build_flags = 
  ${common.build_flags}
  -DHARDWARE_VERSION_STRING=\"CheapYellowDisplay\"
  -DBOOT_DEBUG=1
  -DCYD_TOUCH_DEBUG=1
  -DCYD_SKIP_AUTO_TAPE_LOADER=1
  -DSPECTRUM_48K_ONLY=1
  -DCYD_NO_EMULATOR_MENU=1
  -DCYD_EMULATOR_X_RIGHT=0
  -DCYD_EMULATOR_X_LEFT=32
  -DCYD_EMULATOR_Y=0
  -DCYD_EMULATOR_W=288
  -DCYD_SPECTRUM_BORDER_TOP=2
  -DCYD_SPECTRUM_BORDER_BOTTOM=10
  -DCYD_COMMAND_ROW_H=8
  -DCYD_TOUCH_KEYBOARD=1
  -DCYD_TOUCH_CS=33
  -DCYD_TOUCH_IRQ=36
  -DCYD_TOUCH_CLK=25
  -DCYD_TOUCH_MISO=39
  -DCYD_TOUCH_MOSI=32
  -DCYD_TOUCH_SWAP_XY=1
    ; TFT setup
  -DTFT_ILI9341
  -DTFT_SPI_FREQUENCY=SPI_MASTER_FREQ_40M
  -DTFT_WIDTH=320 
  -DTFT_HEIGHT=240
  -DTFT_SCLK=GPIO_NUM_14
  -DTFT_MISO=GPIO_NUM_12
  -DTFT_MOSI=GPIO_NUM_13
  -DTFT_RST=GPIO_NUM_NC
  -DTFT_DC=GPIO_NUM_2
  -DTFT_CS=GPIO_NUM_15
  -DTFT_BL=GPIO_NUM_21
  -DTFT_BACKLIGHT_ON=HIGH
  ; SPEAKER - don't use DAC it's noisy on the CYD - bodge it with PWM
  -DBUZZER_GPIO_NUM=GPIO_NUM_26
  ; SD card (shares TFT SPI2 bus — VSPI/SPI3 is reserved for XPT2046 touch)
  -DUSE_SDCARD
  -DSD_CARD_SPI_HOST=SPI2_HOST
  -DSD_CARD_CS=GPIO_NUM_5

